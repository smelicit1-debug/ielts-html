<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Interactive Resume Tool</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f5f3;--bg-tertiary:#efefec;
  --text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#9b9b9b;
  --border-light:rgba(0,0,0,.1);--border-medium:rgba(0,0,0,.18);
  --radius-md:8px;--radius-lg:12px;--radius-xl:16px;
}
@media(prefers-color-scheme:dark){:root{
  --bg-primary:#1e1e1e;--bg-secondary:#2a2a2a;--bg-tertiary:#333;
  --text-primary:#f0f0f0;--text-secondary:#aaa;--text-tertiary:#777;
  --border-light:rgba(255,255,255,.1);--border-medium:rgba(255,255,255,.18);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text-primary);background:var(--bg-tertiary);min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg-secondary);border-right:0.5px solid var(--border-light);overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-title{font-size:11px;font-weight:600;color:var(--text-secondary);padding:14px 14px 8px;text-transform:uppercase;letter-spacing:.07em;border-bottom:0.5px solid var(--border-light);flex-shrink:0}
.sidebar-item{padding:8px 14px;font-size:13px;cursor:pointer;border-left:2px solid transparent;color:var(--text-primary);line-height:1.4;transition:background .12s}
.sidebar-item:hover{background:var(--bg-primary)}
.sidebar-item.active{border-left-color:#7F77DD;background:var(--bg-primary);font-weight:500}
.side-cnt{color:var(--text-tertiary);font-size:10px}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:0.5px solid var(--border-light);background:var(--bg-primary);flex-shrink:0;flex-wrap:wrap}
.topbar-tab{padding:6px 12px;font-size:13px;cursor:pointer;border-radius:var(--radius-md);border:0.5px solid transparent;color:var(--text-secondary);display:flex;align-items:center;gap:5px;transition:background .12s}
.topbar-tab.active{border-color:var(--border-medium);background:var(--bg-secondary);color:var(--text-primary);font-weight:500}
.topbar-tab:hover:not(.active){background:var(--bg-secondary)}
.topbar-actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 12px;font-size:12px;cursor:pointer;border-radius:var(--radius-md);border:0.5px solid var(--border-medium);background:var(--bg-primary);color:var(--text-primary);display:flex;align-items:center;gap:5px;transition:background .12s;white-space:nowrap}
.btn:hover{background:var(--bg-secondary)}
.btn.primary{background:#7F77DD;color:#fff;border-color:#534AB7;font-weight:500}
.btn.primary:hover{background:#534AB7}
.content{flex:1;overflow-y:auto;padding:20px}
.resume-wrap{max-width:720px;margin:0 auto;background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden}
.resume-header{background:#534AB7;padding:28px 32px;display:flex;gap:20px;align-items:flex-start}
.profile-circle{width:88px;height:88px;border-radius:50%;border:3px solid rgba(255,255,255,.35);background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;overflow:hidden;position:relative;transition:border-color .2s}
.profile-circle:hover{border-color:rgba(255,255,255,.65)}
.profile-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.profile-circle .upload-icon{font-size:26px;color:rgba(255,255,255,.75);pointer-events:none}
.resume-name-area{color:#fff;flex:1;min-width:0}
.resume-name{font-size:22px;font-weight:500;margin-bottom:5px;outline:none;border-bottom:1px dashed rgba(255,255,255,.3);min-width:40px}
.resume-name:focus{border-bottom-color:rgba(255,255,255,.7)}
.resume-sub{font-size:14px;opacity:.8;outline:none;border-bottom:1px dashed transparent;min-width:40px}
.resume-sub:focus{border-bottom-color:rgba(255,255,255,.5);opacity:1}
.resume-hint{margin-top:10px;font-size:11px;opacity:.55;display:flex;gap:14px;flex-wrap:wrap}
.resume-body{padding:24px 32px}
.section{margin-bottom:22px}
.section-label{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid transparent;transition:transform .1s,filter .1s;font-weight:400;line-height:1.4}
.chip:hover{transform:scale(1.04);filter:brightness(.95)}
.chip.purple{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.chip.teal{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.chip.coral{background:#FAECE7;color:#712B13;border-color:#F0997B}
.chip.pink{background:#FBEAF0;color:#72243E;border-color:#ED93B1}
.chip.blue{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.chip.green{background:#EAF3DE;color:#27500A;border-color:#97C459}
.chip.amber{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-light);width:500px;max-width:100%;max-height:85vh;overflow-y:auto;padding:22px 24px}
.modal-title{font-size:16px;font-weight:500;margin-bottom:5px}
.modal-q{font-size:12px;color:var(--text-secondary);margin-bottom:14px;font-style:italic;line-height:1.5}
.modal-answer{width:100%;min-height:130px;padding:10px 12px;font-size:13px;border:0.5px solid var(--border-medium);border-radius:var(--radius-md);font-family:inherit;color:var(--text-primary);background:var(--bg-secondary);resize:vertical;line-height:1.65;transition:border-color .15s}
.modal-answer:focus{outline:none;border-color:#7F77DD}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.modal-hint{font-size:11px;color:var(--text-tertiary)}
.q-list{display:flex;flex-direction:column;gap:7px}
.q-item{padding:11px 13px;border-radius:var(--radius-md);border:0.5px solid var(--border-light);font-size:13px;background:var(--bg-secondary);line-height:1.55;cursor:pointer;transition:background .12s}
.q-item:hover{background:var(--bg-primary)}
.q-answer-reveal{display:none;margin-top:8px;padding:10px 12px;border-radius:6px;background:var(--bg-tertiary);font-size:13px;line-height:1.6;border-left:3px solid #7F77DD;color:var(--text-primary)}
.q-topic-badge{font-size:10px;color:var(--text-secondary);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.topic-block{margin-bottom:24px}
.topic-heading{font-size:14px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;border:0.5px solid}
.badge.resume{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.badge.num{background:var(--bg-secondary);color:var(--text-secondary);border-color:var(--border-light)}
/* Mobile */
@media(max-width:768px){
  .app{flex-direction:column;height:100dvh}
  .sidebar{position:fixed;top:0;left:-260px;width:260px;height:100dvh;z-index:100;transition:left .25s;box-shadow:4px 0 20px rgba(0,0,0,.3)}
  .sidebar.open{left:0}
  .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
  .sidebar-overlay.show{display:block}
  .main{width:100%}
  .topbar{overflow-x:auto;gap:4px;padding:8px 10px;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .topbar-tab{font-size:12px;padding:5px 10px;white-space:nowrap;flex-shrink:0}
  .topbar-actions{margin-left:0;width:100%;justify-content:flex-start;padding-top:6px;border-top:0.5px solid var(--border-light);margin-top:4px}
  .topbar-actions .btn{font-size:11px;padding:5px 10px}
  .content{padding:12px}
  .resume-header{flex-direction:column;align-items:center;text-align:center;padding:20px 16px}
  .resume-name-area{text-align:center}
  .resume-body{padding:16px}
  .game-options{grid-template-columns:1fr}
  .game-qbox{min-height:80px;padding:16px;font-size:14px}
  .flash-card{min-height:200px;padding:20px 16px}
  .modal{width:90vw;padding:16px}
  .sidebar-title{padding:12px 14px}
  .sidebar-item{padding:10px 14px;font-size:14px}
  .menu-btn{display:flex!important;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:0.5px solid var(--border-medium);background:var(--bg-primary);cursor:pointer;font-size:18px;flex-shrink:0}
  .resume-wrap{border-radius:var(--radius-md)}
  .game-header{padding:12px 14px;flex-wrap:wrap;gap:8px}
  .game-score{font-size:20px}
  .game-start .cards .card{min-width:140px;max-width:100%}
  .drag-area{padding:12px}
  .drag-slot{min-width:60px;padding:8px 10px;font-size:12px}
  .analysis-box{padding:16px}
  .profile-circle{width:72px;height:72px}
  .resume-name{font-size:18px}
  .side-cnt{font-size:9px}
  .flash-stats{font-size:11px;gap:10px}
  .flash-q{font-size:14px}
  .flash-a{font-size:13px}
  .chip{font-size:11px;padding:4px 9px}
  .game-opt-row{grid-template-columns:1fr}
  .game-timer{font-size:12px}
}
@media(max-width:480px){
  .topbar-actions .btn{font-size:10px;padding:4px 8px}
  .resume-header{padding:16px 12px}
  .resume-body{padding:12px}
  .content{padding:8px}
  .game-start{padding:30px 12px}
  .game-qbox{min-height:60px;padding:12px;font-size:13px}
  .flash-card{min-height:160px;padding:16px 12px}
  .game-opt{padding:12px;font-size:13px}
  .modal{padding:12px}
  .modal-answer{min-height:100px;font-size:12px}
  .chip{padding:3px 7px;font-size:10px}
  .section{margin-bottom:16px}
}
.menu-btn{display:none}
.sidebar-overlay{display:none}
.game-wrap{max-width:600px;margin:0 auto;text-align:center}
.game-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);margin-bottom:16px}
.game-score{font-size:24px;font-weight:700;color:#7F77DD}
.game-streak{font-size:13px;color:var(--text-secondary)}
.game-qbox{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:28px 24px;margin-bottom:16px;min-height:120px;display:flex;align-items:center;justify-content:center}
.game-qtext{font-size:16px;line-height:1.6;max-width:480px}
.game-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.game-opt{padding:14px 16px;border-radius:var(--radius-md);border:0.5px solid var(--border-medium);background:var(--bg-primary);cursor:pointer;font-size:14px;text-align:left;transition:background .12s,border-color .12s}
.game-opt:hover{background:var(--bg-secondary)}
.game-opt.correct{background:#d4edda;border-color:#28a745;color:#155724}
.game-opt.wrong{background:#f8d7da;border-color:#dc3545;color:#721c24}
.game-opt.disabled{pointer-events:none;opacity:.7}
.game-start{text-align:center;padding:60px 20px}
.game-start-icon{font-size:64px;margin-bottom:16px}
.game-start h2{font-size:22px;margin-bottom:8px}
.game-start p{color:var(--text-secondary);margin-bottom:24px;font-size:14px}
.game-start .cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.game-start .cards .card{flex:1;min-width:180px;max-width:240px;padding:20px;border-radius:var(--radius-lg);border:0.5px solid var(--border-light);background:var(--bg-primary);cursor:pointer;transition:all .15s}
.game-start .cards .card:hover{border-color:#7F77DD;transform:translateY(-2px);box-shadow:0 4px 12px rgba(127,119,221,.15)}
.game-start .cards .card .icon{font-size:32px;margin-bottom:8px}
.game-start .cards .card h3{font-size:15px;margin-bottom:4px}
.game-start .cards .card p{font-size:12px;color:var(--text-secondary);margin:0}
.game-start .modes{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:16px}
.game-end{text-align:center;padding:60px 20px}
.game-end-icon{font-size:64px;margin-bottom:16px}
.game-end h2{font-size:22px;margin-bottom:4px}
.game-end-score{font-size:48px;font-weight:700;background:linear-gradient(135deg,#7F77DD,#E77DDD);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0}
.game-end-msg{color:var(--text-secondary);margin-bottom:24px;font-size:14px}
.game-timer{font-size:13px;color:var(--text-secondary);font-variant-numeric:tabular-nums}.game-opt-wrap{display:flex;flex-direction:column;gap:10px}.game-opt-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ai-btn{background:linear-gradient(135deg,#7F77DD,#E77DDD);color:#fff;border:none;font-weight:500}
.ai-btn:hover{filter:brightness(1.1)}.ai-btn:disabled{filter:grayscale(.5);cursor:not-allowed}
.ai-loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.drag-area{background:var(--bg-primary);border:2px dashed var(--border-medium);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;min-height:200px;transition:border-color .15s,background .15s}
.drag-area.drag-over{border-color:#7F77DD;background:rgba(127,119,221,.05)}
.drag-item{padding:10px 14px;margin:6px;border-radius:var(--radius-md);border:0.5px solid var(--border-medium);background:var(--bg-secondary);cursor:grab;display:inline-block;font-size:13px;transition:all .12s;user-select:none}
.drag-item:active{cursor:grabbing;transform:scale(.96)}
.drag-item.dragging{opacity:.4}
.drag-slot{display:inline-flex;align-items:center;padding:10px 14px;margin:6px;border-radius:var(--radius-md);border:2px dashed var(--border-light);min-width:80px;min-height:42px;background:var(--bg-primary);transition:all .12s}
.drag-slot.filled{border-style:solid;border-color:#7F77DD;background:rgba(127,119,221,.08)}
.drag-slot.correct{border-color:#28a745;background:#d4edda;color:#155724}
.drag-slot.wrong{border-color:#dc3545;background:#f8d7da;color:#721c24}
.drag-slot-label{font-size:10px;color:var(--text-tertiary);position:absolute;margin-top:-32px;margin-left:-4px}
.drag-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;padding:8px 0}
.drag-row-label{font-size:12px;font-weight:600;color:var(--text-secondary);min-width:100px;flex-shrink:0}
.analysis-wrap{max-width:720px;margin:0 auto}
.analysis-box{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;white-space:pre-wrap;line-height:1.7;font-size:14px}
.analysis-box h3{font-size:16px;margin-bottom:12px;color:#7F77DD}
.analysis-box .band{font-size:28px;font-weight:700;background:linear-gradient(135deg,#7F77DD,#E77DDD);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.analysis-box .metric{display:flex;gap:12px;margin-bottom:10px;align-items:baseline}
.analysis-box .metric-label{font-weight:600;min-width:120px;font-size:13px}
.analysis-box .metric-bar{flex:1;height:8px;background:var(--bg-tertiary);border-radius:4px;overflow:hidden}
.analysis-box .metric-fill{height:100%;border-radius:4px;transition:width .5s}
.analysis-box ul{margin:8px 0;padding-left:20px}
.analysis-box li{margin-bottom:6px}
.flash-wrap{max-width:500px;margin:0 auto}
.flash-card{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-xl);padding:32px 24px;min-height:240px;cursor:pointer;transition:all .2s;position:relative;perspective:600px;margin-bottom:12px}
.flash-card-inner{transition:transform .3s;transform-style:preserve-3d}
.flash-card.flipped .flash-card-inner{transform:rotateY(180deg)}
.flash-front,.flash-back{backface-visibility:hidden;position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.flash-back{transform:rotateY(180deg)}
.flash-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);margin-bottom:8px}
.flash-q{font-size:15px;line-height:1.6;text-align:center;max-width:400px}
.flash-a{font-size:14px;line-height:1.7;text-align:left;max-width:400px;color:var(--text-primary)}
.flash-tap{font-size:11px;color:var(--text-tertiary);margin-top:16px}
.flash-rate{display:flex;gap:10px;justify-content:center;margin-top:16px}
.flash-rate button{flex:1;padding:12px;border-radius:var(--radius-md);border:0.5px solid var(--border-medium);background:var(--bg-primary);cursor:pointer;font-size:13px;font-weight:500;transition:all .12s}
.flash-rate button:hover{transform:scale(1.03)}
.flash-rate .hard{color:#dc3545;border-color:#dc3545}.flash-rate .hard:hover{background:#f8d7da}
.flash-rate .good{color:#e67e22;border-color:#e67e22}.flash-rate .good:hover{background:#fef3cd}
.flash-rate .easy{color:#28a745;border-color:#28a745}.flash-rate .easy:hover{background:#d4edda}
.flash-progress{height:4px;background:var(--bg-tertiary);border-radius:2px;margin-bottom:16px;overflow:hidden}
.flash-progress-bar{height:100%;background:linear-gradient(90deg,#7F77DD,#E77DDD);border-radius:2px;transition:width .3s}
.flash-stats{display:flex;gap:16px;justify-content:center;font-size:12px;color:var(--text-secondary);margin-bottom:16px}

/* Word popup — dictionary lookup */
.word-popup-overlay{position:fixed;inset:0;z-index:999;display:none}
.word-popup{position:fixed;z-index:1000;width:320px;max-width:90vw;background:var(--bg-primary);border:0.5px solid var(--border-medium);border-radius:var(--radius-lg);box-shadow:0 8px 32px rgba(0,0,0,.25);overflow:hidden;animation:popIn .12s ease-out}
@keyframes popIn{from{opacity:0;transform:translateY(-6px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.word-popup-header{padding:10px 14px 6px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border-light)}
.word-popup-word{font-size:17px;font-weight:600;color:var(--text-primary)}
.word-popup-phonetic{font-size:12px;color:var(--text-tertiary);margin-left:6px}
.word-popup-close{width:26px;height:26px;border-radius:50%;border:none;background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .12s;flex-shrink:0}
.word-popup-close:hover{background:var(--bg-tertiary)}
.word-popup-body{padding:10px 14px 12px}
.word-popup-part{font-size:11px;font-weight:600;color:#7F77DD;text-transform:uppercase;letter-spacing:.06em;margin:6px 0 3px}
.word-popup-def{font-size:13px;line-height:1.55;color:var(--text-primary);margin-bottom:2px}
.word-popup-example{font-size:12px;color:var(--text-tertiary);font-style:italic;margin-bottom:4px;padding-left:8px;border-left:2px solid var(--border-light)}
.word-popup-simple{font-size:13px;line-height:1.55;color:var(--text-primary);padding:8px 10px;background:rgba(127,119,221,.08);border-radius:var(--radius-md);margin:6px 0;border-left:3px solid #7F77DD}
.word-popup-simple-label{font-size:10px;font-weight:600;color:#7F77DD;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.word-popup-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.word-popup-actions .btn{font-size:11px;padding:5px 10px}
.word-popup-loading{padding:20px;text-align:center;color:var(--text-secondary);font-size:13px}
.word-popup-error{padding:14px;font-size:13px;color:var(--text-secondary);text-align:center}
.word-popup-error .fallback-def{color:var(--text-primary);margin-top:6px;font-size:13px;font-style:italic;padding:8px;background:var(--bg-secondary);border-radius:var(--radius-md)}
@media(max-width:480px){
  .word-popup{width:92vw;max-height:60vh;overflow-y:auto}
}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-title">Topics</div>
    <div id="sidebarList"></div>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
      <div class="topbar-tab active" id="tab-resume" onclick="switchTab('resume')">
        <i class="ti ti-id-badge-2"></i> Resume
      </div>
      <div class="topbar-tab" id="tab-questions" onclick="switchTab('questions')">

const SAMPLE_ANSWERS = {
  1:{0:"I'm from Dalian, a vibrant coastal city in northeast China known for its stunning beaches, fresh seafood, and European-influenced architecture. It's a place that really feels like home.",1:"Dalian is actually one of China's major port cities, with a population of over 7 million. Despite its size, it has a surprisingly relaxed coastal atmosphere.",2:"My hometown is a beautiful seaside city surrounded by hills and famous for its clean air, thriving software industry, and incredible seafood markets. The people there are incredibly friendly and laid-back.",3:"I've lived there my whole life — around 22 years. I grew up in the same neighbourhood near the coast and went to school just a short walk from the beach.",4:"I genuinely enjoy living there. The cost of living is reasonable, the seafood is outstanding, and there's always something interesting happening along the coastline.",5:"What I love most is the coastal scenery — from the winding滨海路 to the vibrant fishing ports. There's also a strong sense of community that makes the city feel warm.",6:"The winter winds can be quite cold coming off the sea, and the tourist crowds in summer can get overwhelming at popular beaches.",7:"I'm planning to stay for the foreseeable future. Most of my family and close friends are here, and the tech industry in Dalian is growing rapidly.",8:"Ideally, I'd love to eventually spend time in a coastal European city like Barcelona — but I'd always want to return home to Dalian eventually.",9:"Yes, very much. Dalian has a quality of life that's hard to find elsewhere — modern and connected yet still relaxed and close to nature."},
  2:{0:"I currently live with my parents and younger sister in a three-bedroom apartment. It's comfortable and in a convenient part of the city.",1:"I've been at this address for about five years. We moved when my parents changed jobs, and it's been a great location ever since.",2:"I think we'll stay for the next few years at least. My parents own the flat, so there's no pressure to move.",3:"It's a modern apartment on the 14th floor with a nice city view. The living room is spacious and gets a lot of natural light in the afternoons.",4:"We spend the most time in the living room — it's where we eat dinner together, watch TV, and relax after work or school.",5:"My current flat is much more modern than the older house I grew up in as a small child. We have better facilities and much more space now.",6:"I slightly prefer a house because of the private garden, but practically speaking, living in a flat is much more convenient in a big city.",7:"In the future, I'd love a spacious apartment with a large balcony, ideally in a quieter neighbourhood with good transport links.",8:"I'd prefer somewhere green and peaceful — close to a park, with good schools nearby if I eventually have a family.",9:"I spend a lot of time reading and studying at my desk, and in the evenings I cook and spend time with my family in the living room.",10:"I love my bedroom most — it's my personal space where I can recharge and focus, decorated with books and plants.",11:"The transport is excellent — there's a metro station five minutes away and several bus lines. Getting anywhere in the city is straightforward."},
  3:{0:"Yes, I really do. It's a diverse and lively neighbourhood with plenty of cafes, parks, and local shops. There's a strong sense of community here.",1:"There have been quite a few positive changes recently — a new community park opened last year, and several trendy cafes have moved in.",2:"Not personally, but our district is near where some well-known local athletes train, and I've occasionally spotted them at the nearby gym.",3:"I love going to the riverside park in the evenings for a walk, and there's a fantastic weekend market nearby that I visit almost every Saturday."},
  4:{0:"I chose to study software engineering because I've always been fascinated by technology and how it can solve real-world problems. It felt like a natural fit.",1:"I find it very interesting, although some modules are challenging. The programming projects are particularly engaging because they're so practical.",2:"My main subjects are algorithms, software architecture, database management, and human-computer interaction. It's a broad curriculum with lots of hands-on projects.",3:"I'm definitely more productive in the morning. My concentration is sharpest before noon, so I tackle the most demanding coursework early in the day.",4:"Absolutely — I'm excited about entering the tech industry. I hope to work on innovative products that genuinely make people's lives easier.",5:"I work part-time as a junior web developer at a small startup. It's a great way to apply what I'm learning at university in a real setting.",6:"I chose tech because it combines creativity with logic, and the job market is strong. I wanted a career that would remain relevant and evolving.",7:"Occasionally I miss the structure and social aspects of school life, but I appreciate the independence that working brings.",8:"I really enjoy it. The team is collaborative, the projects are meaningful, and I'm learning something new almost every day."},
  5:{0:"Yes, I quite enjoy my own company. I'm fairly introverted, so spending time alone helps me recharge and process my thoughts.",1:"Last time I was alone, I went for a long walk in the park, listened to a podcast, and then spent the afternoon reading a novel.",2:"I usually read, practice coding, or work on personal projects. Sometimes I just listen to music or go for a solo walk to clear my head.",3:"I do — very much so. I think having time to yourself is essential for mental clarity. That said, I also value social connection, so I balance both."},
  7:{0:"Yes, my name has a lovely meaning in Chinese — it roughly translates to 'bright and prosperous future', which my parents chose as a hope for my life.",1:"I'd want to choose something meaningful in Chinese but also easy for international colleagues to remember. Names that work across cultures are increasingly important.",2:"Definitely. In the past, names often had more traditional or literary references. Nowadays, parents tend to choose names that sound modern or unique.",3:"Interestingly, my grandfather and I share the same middle character in our names — it's a family tradition passed down through the generations.",4:"Yes, names like Wei, Fang, and Jing have been very common for decades. They carry timeless meanings and are still frequently chosen today."},
  8:{0:"I mostly use the metro — it's fast, affordable, and very punctual. Occasionally I take buses for shorter journeys within my neighbourhood.",1:"Mostly in everyday life — I take the metro to university and work. When travelling to other cities, I prefer high-speed rail.",2:"In larger cities, definitely. Metro systems in cities like Beijing and Shanghai are extremely well-developed and most residents rely on them heavily.",3:"Yes, I took the school bus every day as a child. It was always a sociable experience — chatting with friends on the way to school.",4:"Almost certainly, as more people move to cities and environmental awareness grows. Governments are also investing heavily in public transport infrastructure."},
  10:{0:"Yes, I write quite a lot — both for academic work and personal enjoyment. Writing helps me organise my thoughts and communicate more clearly.",1:"I enjoy writing essays and short analytical pieces. There's something satisfying about constructing a well-reasoned argument on the page.",2:"I think my writing style has evolved a lot — becoming more concise and precise as I've learned more about good communication.",3:"I much prefer typing for longer pieces because it's faster and easier to edit. But for brief personal notes, handwriting feels more natural.",4:"I used to keep a diary quite regularly in secondary school, but these days I'm less consistent — perhaps once or twice a month.",5:"Besides writing, I take photos on my phone to capture moments, and I sometimes make brief voice recordings when I have an idea I don't want to forget."},
  17:{0:"Yes, I'd say I'm quite a homebody. I find home a comfortable, productive space where I can fully relax or focus without distractions.",1:"At home, I usually read, cook, watch documentaries, or work on coding projects. Evenings are often spent having dinner with my family.",2:"My bedroom is my favourite spot — it's where I have everything I need: books, computer, and a small plant collection by the window.",3:"As a child I spent a lot of time drawing, playing board games with my sister, and helping my mother in the kitchen on weekends.",4:"I think I'll continue to enjoy spending time at home, though I also want to travel more in the future. A good balance of both sounds ideal."},
  18:{0:"I usually feel groggy and a bit unfocused the next morning after a late night. It takes an extra coffee to get going.",1:"When I stay up late, I usually end up watching documentaries, reading, or coding — things that are engaging enough to keep me awake.",2:"Occasionally on weekends. My parents were fairly strict about bedtimes during school days, so staying up late was a rare treat.",3:"Not very often — perhaps once a week if there's a deadline. I generally prioritise sleep because I feel so much better with enough rest."},
  23:{0:"My first phone was a basic Nokia handset — it could only make calls and send texts, but I was absolutely thrilled with it at the time.",1:"I use it for both, but messaging is probably more frequent — it's so convenient for staying in touch with friends and colleagues throughout the day.",2:"I'm happy with my current phone and don't feel the need to upgrade anytime soon. I tend to keep devices until they genuinely stop working well.",3:"It's transformed how I manage my life — from navigation and payments to staying connected and accessing information instantly. It's genuinely indispensable."},
  24:{0:"Very much so — I love capturing everyday moments and interesting scenes. Photography is a great creative outlet and helps me notice beauty in ordinary things.",1:"Occasionally, but I prefer photographing landscapes and urban scenes rather than selfies. I find the world around me more interesting to document.",2:"My favourite family photo was taken at a Spring Festival dinner a few years ago — everyone was laughing and it perfectly captured that feeling of togetherness.",3:"I'd love to improve — I'm particularly interested in learning more about lighting and composition. Perhaps an online course would help."},
  25:{0:"Friends are extremely important to me. They provide support, laughter, and a sense of belonging that's really crucial for wellbeing.",1:"Yes, usually on weekends — we meet for dinner, visit exhibitions, or just wander around the city together. It's something I genuinely look forward to.",2:"We have a favourite cafe near the university where we go almost every weekend. It's become a sort of tradition for our friend group.",3:"We do a range of things — trying new restaurants, watching films, studying together, or just having long conversations over tea.",4:"Yes, my closest friend and I have known each other since primary school — over 15 years. It's a friendship that's really stood the test of time."},
  26:{0:"Yes, I cook at home fairly regularly — mainly simple weekday meals. I find it relaxing and much healthier than eating out every day.",1:"I helped with basic tasks as a child — washing vegetables, setting the table, and occasionally sweeping. My parents believed in teaching responsibility early.",2:"Most mornings, yes. A proper breakfast sets me up well for the day, and it's a nice routine to start with something nutritious.",3:"Absolutely — I'd love to expand my cooking repertoire. There are several cuisines I want to learn, particularly Italian and Japanese cooking.",4:"I keep things reasonably clean, though I'll admit my desk tends to get cluttered when I'm deep in a project.",5:"I don't mind cooking or washing up, but ironing is definitely my least favourite task — it feels very repetitive and time-consuming."},
  27:{0:"I use both regularly — my phone for communication and everyday tasks, and my laptop for more intensive work like coding and research.",1:"Recently I upgraded my laptop to a newer model. I also picked up a pair of wireless headphones, which have been brilliant for focusing while working.",2:"I've been looking at getting a drawing tablet for digital sketching — it would be a useful creative addition to my setup.",3:"Incredibly so — technology is central to both my studies and my professional work. Without reliable devices, my productivity would drop dramatically.",4:"Excessive social media notifications are something I find disruptive. I've had to disable most of them to maintain focus during work and study sessions.",5:"Technology has evolved from something functional into something deeply integrated into every part of life. When I was younger, we used the internet far more deliberately."},
  28:{0:"Quite frequently — probably 20 to 30 messages a day. I use messaging apps mostly, for both personal conversations and group chats for university projects.",1:"Very much so — messaging apps are essentially the default communication channel for most people across all age groups.",2:"I definitely did — especially during secondary school when messaging friends about homework or social plans was a constant activity.",3:"I try to, especially if it seems urgent. But during study sessions I often put my phone on silent and batch-reply when I take a break."},
  29:{0:"Yes, a few times — I particularly enjoyed the National Museum of China in Beijing. History museums are fascinating for understanding how society has evolved.",1:"Very much so. Understanding history helps make sense of current events and gives perspective on human progress and its complications.",2:"Just last week, actually — I was reading about the Tang Dynasty for a paper. It's a period I find particularly rich and culturally interesting.",3:"Quite a bit, yes. History was one of my favourite subjects — the stories of past civilisations felt almost like reading a grand adventure novel."},
  30:{0:"Significantly busier — the responsibilities and pressures of university and part-time work create a much more demanding schedule than childhood.",1:"Just this past week, actually — assignment deadlines and extra shifts at work all coincided. It was genuinely quite stressful.",2:"During term time, yes. I have lectures, project work, my part-time job, and various commitments that keep my schedule quite full most weeks.",3:"Mostly assignments, project deadlines, and balancing work commitments. Time management becomes really important when everything happens at once.",4:"Mornings before noon tend to be my most productive and therefore busiest period. I also get busy in the evenings when deadlines approach."},
  31:{0:"Yes, for a teacher's retirement gift last year we made a card and wrote personal messages. It felt very meaningful and personal.",1:"Yes — it's genuinely common across all ages and contexts. Chinese culture values gratitude and politeness in interpersonal relationships.",2:"When someone does something genuinely helpful or kind — whether a stranger or a close friend. I also always thank service staff.",3:"Expressing gratitude acknowledges the effort someone has made and strengthens social bonds. It's a small gesture with significant emotional impact."},
  33:{0:"Yes, I find making plans really satisfying. It helps me feel organised and in control of my workload, which reduces stress considerably.",1:"I use both — a digital calendar on my phone for timed appointments, and a paper notebook for daily to-do lists and creative brainstorming.",2:"Planning helps you prioritise effectively, avoid forgetting important tasks, and make better use of limited time. It also reduces last-minute panic."},
  34:{0:"Not as often as I'd like during term time. Weekends tend to offer some breathing space, but even then there's usually something requiring attention.",1:"In my spare time I tend to read novels, go for walks, practice cooking new recipes, and occasionally play video games with friends online.",2:"Sunday is generally quieter — I use Saturday for errands and social plans, whereas Sunday is more reserved for rest and personal activities.",3:"Yes, having a bit more unstructured time would be wonderful. I'd use it to travel more and develop creative hobbies I haven't had time for."},
  35:{0:"I'd say moderately patient — I'm good at waiting when I understand the reason for the delay, but I find unexplained or avoidable waits quite frustrating.",1:"Long queues with no clear purpose and situations where poor communication causes unnecessary delays — those test my patience the most.",2:"Genuinely uncomfortable, to be honest. I prefer to stay productive, so prolonged monotonous tasks can feel draining without a clear end point.",3:"Yes, definitely. My part-time work involves explaining technical concepts to non-technical people, which requires careful and patient communication.",4:"I think I've become considerably more patient. Experience and perspective have taught me that most things worth having simply take time."},
  37:{0:"Yes — I recently completed a challenging coding project that received very positive feedback from my supervisor. It was a genuine confidence booster.",1:"It feels wonderful — there's an immediate sense of validation that motivates you to keep working hard and setting higher standards.",2:"Just recently I complimented my younger sister on a presentation she gave. Seeing how much it meant to her reminded me to praise people more regularly.",3:"Absolutely — positive reinforcement from parents builds confidence and intrinsic motivation. Children flourish when their efforts are genuinely recognised.",4:"Yes — in secondary school, a teacher told me my analytical essay was the best in the class. That moment genuinely shaped how I thought about writing."},
  39:{0:"Yes — attendance policies, academic integrity rules, and behavioural guidelines. Most feel fair and purposeful rather than restrictive.",1:"I think a reasonable set of clear rules actually benefits students by providing structure. Too many rules, however, can feel suffocating and counterproductive.",2:"Yes — my secondary school maths teacher. She stayed after class regularly and went far beyond the syllabus to genuinely inspire her students.",3:"Fewer, but well-enforced rules. Quality over quantity — students respond much better to fair, clearly explained rules than to arbitrary restrictions.",4:"Yes — one teacher in particular was extremely strict, but in hindsight her high standards genuinely prepared me well for university-level work.",5:"That would be quite challenging, I think. Some structure is important for productive learning environments, even if complete freedom sounds appealing in theory."},
  40:{0:"Yes — during a group presentation last semester I took the lead, handled the Q&A confidently, and received strong feedback from the professor.",1:"Yes, my computer science lecturer once highlighted my code solution as an excellent example for the class. It was both embarrassing and flattering.",2:"I try to — genuine acknowledgement means a lot, and I know first-hand how motivating it feels to have your efforts noticed and appreciated."},
  56:{0:"Yes — I enjoy photography, hiking, reading, and coding side projects in my spare time. They each offer something different and balance each other well.",1:"As a child I loved drawing and building things with Lego. I was always making something — whether it was a comic strip or a small invention.",2:"Reading has been a constant throughout my life — it's something I started as a child and have never stopped. The types of books have changed, but the habit hasn't.",3:"My dad and I both enjoy hiking and technology, which gives us a nice shared language. My sister and I both love cooking, which leads to great kitchen experiments."},
  57:{0:"I'm not naturally an early riser, but I've trained myself to wake up at 7am because I feel much more productive when I start the day with intention.",1:"I have a fairly consistent routine — a short workout, a proper breakfast, and then reviewing my schedule before getting into focused work.",2:"As a small child I would wake up early on weekends to watch cartoons, which is quite different from my current structured morning routine.",3:"Yes — as a child my mornings were slower and more playful. Now they're much more purposeful and task-oriented, which I think reflects my priorities changing.",4:"Weekday mornings are more structured and routine-driven. Weekend mornings I allow myself to slow down, have a longer breakfast, and ease into the day."},
  58:{0:"Yes — I once made a handmade photo book for a close friend's birthday. It took hours to put together, but the reaction made it completely worthwhile.",1:"Yes — a particularly thoughtful gift was a collection of annotated books from a mentor who knew exactly what topics I was passionate about at the time.",2:"I think about the person's personality, interests, and what would genuinely be useful or meaningful to them specifically. Generic gifts feel impersonal.",3:"I'd like to think so — I put real thought into it. I'd rather give something small and perfectly chosen than something expensive but generic.",4:"A lovely pair of wireless earphones from my family — practical and something I'd wanted for a while. It was a very thoughtful and well-timed choice."},
  59:{0:"Enormously — reading is my main hobby and one of the most important habits of my life. It builds knowledge, vocabulary, and empathy simultaneously.",1:"I prefer physical books for leisure reading — there's something about holding a book that feels more immersive. But for research I use digital sources more often.",2:"I read carefully for academic texts and anything requiring precise understanding. For news or general browsing I tend to skim for key information.",3:"It depends on context — for creative or narrative writing I prefer detailed reading to appreciate the language, but for factual content I lean toward scanning."},
  60:{0:"Yes, I walk quite a lot — probably 8,000 to 10,000 steps daily. I find walking an excellent way to think and decompress.",1:"Yes, frequently. We lived near a large park where my parents would take us after school. Those walks are a warm childhood memory.",2:"It's accessible, free, and provides both gentle exercise and fresh air. Parks also offer a rare sense of calm within a busy urban environment.",3:"I'd love to walk along the coastline of a Scottish highland loch. The dramatic scenery looks utterly breathtaking in the photographs I've seen.",4:"Just last weekend — I took a long walk through a neighbourhood I'd never explored before and discovered some wonderful street art and independent cafes."},
  61:{0:"Yes, every day without exception. Whether writing code, drafting emails, or making notes, keyboard use is absolutely central to my workflow.",1:"I learned to type properly around age 12. I started with a dedicated typing tutor programme and gradually built up to a comfortable speed over a few months.",2:"Mostly through consistent daily practice. I focus on technique — keeping my wrists up and using all fingers correctly — rather than just typing faster through force.",3:"For longer pieces of work I strongly prefer typing — it's faster, more editable, and better for organisation. Handwriting feels more suitable for brief notes."},
  66:{0:"We used to ride bikes together, play in the park, and meet at each other's homes for long afternoons of games, storytelling, and general childhood mischief.",1:"Right now, developing my technical skills and building a strong foundation for my career feels most important. Personal growth and good relationships matter equally.",2:"Over the next five years, I hope to complete my degree, secure a full-time role in software development, and ideally spend some time working or travelling abroad.",3:"Through photographs, keepsakes, journals, and especially shared stories told by family members. The retelling of memories keeps them vivid across generations.",4:"Very much so. I feel a sense of clarity and purpose at this age that I didn't have in my teens. I'm aware of who I am and what I value.",5:"I think different ages bring different kinds of happiness. Children experience pure joy freely; adults can experience deeper, more meaningful contentment."},
  67:{0:"I usually wake up around 7am, have breakfast, review my to-do list, study or work through the morning, take a lunch break, and use evenings for lighter activities.",1:"Yes — I overhauled my schedule at the start of this year, prioritising deep work in the mornings and reserving social or creative activities for evenings.",2:"Absolutely. A consistent routine reduces decision fatigue and ensures important priorities like study and exercise don't get crowded out by minor tasks.",3:"The morning is definitely my favourite part of the day. There's a particular clarity and optimism to early mornings before the world gets fully busy.",4:"I try to be in bed by 11pm most nights. Good sleep is a genuine priority for me — I notice an enormous difference in performance when I'm well-rested."},
  6:{0:"Yeah I did puzzles as a kid — jigsaw ones mostly. My grandma and I used to do them together on rainy afternoons. It was more about spending time with her than the puzzle itself.",2:"Honestly I'm better with word puzzles. Crosswords are my thing. Number puzzles like Sudoku just make my brain hurt — I don't have the patience for all those digits."},
  9:{0:"I'm a total savoury snack person. Give me spicy peanuts or seaweed crisps over chocolate any day. I always have a stash in my desk drawer for when the 4pm slump hits."},
  11:{0:"Honestly I find geography pretty fascinating. I love looking at maps and learning about different places — it makes the world feel smaller and more connected somehow."},
  22:{0:"Oh absolutely, there are some gorgeous old buildings in my city. I love the ones with the traditional Chinese roofs — they've got so much more character than the glass towers going up everywhere now."},
  32:{0:"I love flowers! I've always got a little vase of fresh ones on my desk. They just instantly lift the mood in a room — doesn't matter what kind, anything with colour works for me."},
  12:{0:"I wouldn't say I'm any good at it but I love singing along to music in the car or the shower. It's just such a mood booster. Doesn't matter if you're off-key honestly."},
  13:{2:"Mostly I need to remember deadlines, appointments, and the million little passwords I've created over the years. My phone calendar basically runs my life at this point."},
  14:{0:"I keep it pretty low-key honestly — usually just dinner with close family and a few friends. I'm not really about the big party scene. A nice meal and good company is all I need."},
  15:{0:"I live in a city with four proper seasons so I get a bit of everything. Summers are hot and humid, winters are cold and dry. Spring and autumn are gorgeous but way too short."},
  16:{1:"Oh for sure, I always compare prices. I've got apps for it and everything. Why pay more if you don't have to? It's not about being cheap — it's about not getting ripped off."},
  19:{0:"Recently? Honestly just the simple stuff — a good coffee in the morning, catching up with an old friend, finishing a project I was stuck on. The small wins hit different."},
  20:{0:"Do I like chocolate? What kind of question is that? Of course I do. Dark chocolate specifically — none of that overly sweet milky stuff. A couple of squares after dinner is my daily ritual."},
  21:{0:"Love it. There's nothing quite like being in the water — it's the one time my brain actually shuts up and I'm just... present. Super meditative honestly."},
  36:{2:"Guilty as charged — I'm a total instructions skipper. I like to figure things out as I go. Sometimes it backfires spectacularly but hey, that's how you learn right?"},
  38:{1:"Pretty much constantly honestly. Headphones on = do not disturb. It's my way of telling the world I'm in my own bubble. Plus my playlist is way more interesting than the subway announcements.",2:"I wouldn't say no to more green spaces nearby. A nice park or a riverside walkway makes such a difference to a neighbourhood. Cities need breathing room."},
  41:{2:"Not really if I'm being honest. I find crowded places pretty overwhelming — too much noise, too many people bumping into you. I'd take a quiet cafe over a packed club any day."},
  42:{0:"Almost always — I'm that person with snacks in my bag at all times. You never know when you'll get hungry. Plus cafe prices are wild these days so bringing your own just makes sense."},
  43:{2:"I actually really do. Old people have the best stories and they don't rush through conversations the way younger people do. There's a calmness to spending time with them that I really appreciate."},
  44:{0:"It's getting more popular for sure, especially in the suburbs. My neighbour grows tomatoes and chillies on her balcony and honestly I'm pretty jealous of her setup. Fresh herbs just hit different."},
  45:{0:"Love it. I'm definitely a chatty person — I could talk for hours about nothing and everything. Good conversation is genuinely underrated as a form of self-care."},
  46:{2:"I don't mind lending things out but I've definitely been burned before. Books mostly — people borrow them and they just... disappear. I've lost count of how many copies of my favourite novel I've bought."},
  47:{0:"I try to take short breaks throughout the day honestly. The Pomodoro technique works pretty well for me — 25 minutes of focus, 5 minutes to breathe. Keeps me from burning out by 3pm."},
  48:{0:"I do! My apartment is full of plants — snake plants, pothos, a fiddle leaf fig that's dramatically dropping leaves as we speak. They make the place feel alive even when I'm working from home alone."},
  49:{0:"I'm a bit of a sneakerhead if I'm honest. I don't buy them super often — maybe every few months — but when I do I go for quality over quantity. A good pair of shoes is worth investing in."},
  50:{2:"Not really, most of them are pretty annoying. Especially the ones that interrupt my YouTube videos. But I do appreciate a clever ad — the ones that tell a story or make you laugh. Those are rare though."},
  51:{2:"Not as often as I should honestly. Maybe once or twice a year. Every time I go I wonder why I don't go more often. There's something special about standing in front of something centuries old."},
  52:{0:"I'm pretty open with sharing honestly — food, knowledge, playlists, umbrellas when it's raining. I think growing up with siblings taught me that sharing isn't losing. It just comes back around."},
  53:{0:"That's a tough one. If I had to pick — probably ramen. There's this little hole-in-the-wall shop near my place that makes the most incredible tonkotsu broth. Pure comfort in a bowl."},
  54:{0:"Dogs, no contest. I'm a total dog person. Their enthusiasm is just so contagious — you come home in the worst mood and one wagging tail just fixes everything. Cats are cool too but dogs are special."},
  55:{0:"Yeah, I played basketball in high school. Nothing serious — just a casual school team. But I loved it. There's something about working towards a common goal with a group of people that's really satisfying.",2:"Team sports for sure. I love the camaraderie — sharing a win with teammates hits way different than winning something alone. Individual sports feel too lonely for me."},
  62:{0:"All the time honestly. I'm that person taking photos of random facades and interesting windows. Buildings tell a story about a city in a way that nothing else does."},
  63:{0:"I was obsessed with Lego as a kid. I'd spend hours building spaceships and castles. Also loved playing outside — riding bikes, climbing trees, the usual stuff. Simple times."},
  64:{2:"I lean towards natural views honestly. A mountain range or a coastline just hits different than any city skyline. Urban views are cool for photos but nature views are good for the soul."},
  65:{1:"Mountains for sure. I love the sea but there's something about being up high looking down at the world that's just unbeatable. The air is cleaner, it's quieter, everything slows down."}
};

let state = {currentTab:"resume",resumeView:"resume",currentTopic:null,profileImg:null,resumeName:"Your Name",resumeSubtitle:"IELTS Candidate · Student",answers:{}};
let game = {active:false,questions:[],idx:0,score:0,total:0,streak:0,bestStreak:0,answered:false,startTime:null,timerInterval:null,elapsed:0};

function getAnswer(tid,qi){const k=`${tid}_${qi}`;if(state.answers[k]!==undefined)return state.answers[k];if(SAMPLE_ANSWERS[tid]&&SAMPLE_ANSWERS[tid][qi]!==undefined)return SAMPLE_ANSWERS[tid][qi];const t=TOPICS.find(x=>x.id===tid);return t?`Sample answer for: "${t.qs[qi]}". Click to edit with your own IELTS response.`:"";}
function saveAnswer(tid,qi,val){state.answers[`${tid}_${qi}`]=val;try{localStorage.setItem('ielts_answers',JSON.stringify(state.answers));}catch(e){}}

function loadSaved(){
  try{
    const a=localStorage.getItem('ielts_answers');if(a)state.answers=JSON.parse(a);
    const p=localStorage.getItem('ielts_profile');if(p)state.profileImg=p;
    const n=localStorage.getItem('ielts_name');if(n)state.resumeName=n;
    const s=localStorage.getItem('ielts_sub');if(s)state.resumeSubtitle=s;
    // Load current resume if set
    const cn=localStorage.getItem('ielts_current_resume');
    if(cn){
      const rs=JSON.parse(localStorage.getItem('ielts_resumes')||'[]');
      const r=rs.find(x=>x.name===cn);
      if(r){
        if(r.answers)state.answers=r.answers;
        if(r.profile)state.profileImg=r.profile;
        if(r.name)state.resumeName=r.name;
        if(r.subtitle)state.resumeSubtitle=r.subtitle;
        try{localStorage.setItem('ielts_answers',JSON.stringify(state.answers));}catch(e){}
        if(r.profile)try{localStorage.setItem('ielts_profile',r.profile);}catch(e){}
        try{localStorage.setItem('ielts_name',state.resumeName);}catch(e){}
        try{localStorage.setItem('ielts_sub',state.resumeSubtitle);}catch(e){}
      }
    }
  }catch(e){}
}

function saveResumeDialog(){
  const name=prompt('Name this resume:','My Resume');
  if(!name||!name.trim())return;
  const trimmed=name.trim();
  const resumes=JSON.parse(localStorage.getItem('ielts_resumes')||'[]');
  const existing=resumes.findIndex(r=>r.name===trimmed);
  const entry={
    name:trimmed,
    answers:JSON.parse(JSON.stringify(state.answers)),
    profile:state.profileImg,
    subtitle:state.resumeSubtitle,
    count:Object.keys(state.answers).length,
    saved:new Date().toISOString()
  };
  if(existing>=0)resumes[existing]=entry;
  else resumes.push(entry);
  localStorage.setItem('ielts_resumes',JSON.stringify(resumes));
  localStorage.setItem('ielts_current_resume',trimmed);
  renderResume();
}

function switchResume(name){
  if(!name){localStorage.removeItem('ielts_current_resume');renderResume();return;}
  const resumes=JSON.parse(localStorage.getItem('ielts_resumes')||'[]');
  const r=resumes.find(x=>x.name===name);
  if(!r)return;
  localStorage.setItem('ielts_current_resume',name);
  if(r.answers){state.answers=JSON.parse(JSON.stringify(r.answers));try{localStorage.setItem('ielts_answers',JSON.stringify(state.answers));}catch(e){}}
  if(r.profile){state.profileImg=r.profile;try{localStorage.setItem('ielts_profile',r.profile);}catch(e){}}
  if(r.name){state.resumeName=r.name;try{localStorage.setItem('ielts_name',r.name);}catch(e){}}
  if(r.subtitle){state.resumeSubtitle=r.subtitle;try{localStorage.setItem('ielts_sub',r.subtitle);}catch(e){}}
  renderResume();
}

function deleteResume(){
  const cn=localStorage.getItem('ielts_current_resume');
  if(!cn||!confirm(`Delete resume "${cn}"?`))return;
  let resumes=JSON.parse(localStorage.getItem('ielts_resumes')||'[]');
  resumes=resumes.filter(r=>r.name!==cn);
  localStorage.setItem('ielts_resumes',JSON.stringify(resumes));

function getKeywordText(tid,qi){
  const key=tid+'_'+qi;
  const ans=state.answers[key]||SAMPLE_ANSWERS[tid]?.[qi]||'';
  if(!ans)return TOPICS.find(t=>t.id===tid)?.name||'Topic';
  // Take first meaningful phrase from the answer
  let clean=ans.replace(/^(Yes|No|I think|I'd say|Absolutely|Definitely|Not really|Well|Actually|Honestly|To be honest|I guess|Probably|Sure|Of course|Yeah)[,\s]*/i,'').trim();
  // Remove leading articles/prepositions
  clean=clean.replace(/^(The|A|An|In|At|On|For|With|By|From|My|It's|It is|They are|There are|There is)\s+/i,'').trim();
  const words=clean.split(/\s+/);
  let kw=words.slice(0,5).join(' ');
  if(kw.length>35)kw=kw.slice(0,32)+'…';
  return kw||TOPICS.find(t=>t.id===tid)?.name||'Topic';
}

function render(){
  renderSidebar();

function startClassicGame(){
  const pool=TOPICS.map(t=>t.qs.map((q,i)=>({q,tid:t.id,tn:t.name,qi:i}))).flat();
  const shuffled=pool.sort(()=>Math.random()-.5).slice(0,15);
  game={mode:'classic',active:true,questions:shuffled,idx:0,score:0,total:15,streak:0,bestStreak:0,answered:false,startTime:Date.now(),timerInterval:null,elapsed:0};
  game.timerInterval=setInterval(()=>{game.elapsed=Math.floor((Date.now()-game.startTime)/1000);},1000);
  render();
}

function renderClassicGame(){
  if(game.idx>=game.total){renderGameEnd();return;}
  const q=game.questions[game.idx];
  const others=TOPICS.filter(t=>t.id!==q.tid).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[{id:q.tid,name:TOPICS.find(t=>t.id===q.tid).name},...others.map(t=>({id:t.id,name:t.name}))].sort(()=>Math.random()-.5);
  const m=Math.floor(game.elapsed/60),sec=game.elapsed%60;
  document.getElementById('mainContent').innerHTML=`
    <div class="game-wrap">
      <div class="game-header">
        <div><div class="game-score">${game.score}/${game.total}</div><div class="game-streak">🔥 ${game.streak} streak</div></div>
        <div><div class="game-timer"><i class="ti ti-clock"></i> ${m}:${sec.toString().padStart(2,'0')}</div></div>
        <div><span style="font-size:13px;color:var(--text-secondary)">${game.idx+1}/${game.total}</span></div>
      </div>
      <div class="game-qbox">
        <div class="game-qtext">"${q.q}"</div>
      </div>
      <div class="game-options">
        ${opts.map(o=>`<div class="game-opt" data-tid="${o.id}" onclick="handleClassicAnswer(${o.id})">${o.name}</div>`).join('')}
      </div>
    </div>`;
}

function handleClassicAnswer(tid){
  if(game.answered)return;
  game.answered=true;
  const q=game.questions[game.idx];
  const btns=document.querySelectorAll('.game-opt');
  btns.forEach(b=>b.classList.add('disabled'));
  if(tid===q.tid){game.score++;game.streak++;if(game.streak>game.bestStreak)game.bestStreak=game.streak;}
  else game.streak=0;
  btns.forEach(b=>{const n=parseInt(b.dataset.tid);if(n===q.tid)b.classList.add('correct');if(n===tid&&tid!==q.tid)b.classList.add('wrong');});
  setTimeout(()=>{game.idx++;game.answered=false;if(game.idx>=game.total)clearInterval(game.timerInterval);render();},1200);
}

function startDragGame(){
  const pool=TOPICS.map(t=>t.qs.map((q,i)=>({q,tid:t.id,tn:t.name,qi:i}))).flat();
  const shuffled=pool.sort(()=>Math.random()-.5).slice(0,8);
  const topics=[...new Set(shuffled.map(s=>s.tid))].sort(()=>Math.random()-.5).slice(0,4);
  const questions=shuffled.filter(s=>topics.includes(s.tid)).slice(0,8);
  game={mode:'drag',active:true,questions,idx:0,score:0,total:questions.length,streak:0,bestStreak:0,answered:false,startTime:Date.now(),timerInterval:null,elapsed:0,dragSlots:topics,dragPlaced:{}};
  game.timerInterval=setInterval(()=>{game.elapsed=Math.floor((Date.now()-game.startTime)/1000);},1000);
  render();
}

function renderDragGame(){
  if(game.idx>=game.total){renderGameEnd();return;}
  const current=game.questions[game.idx];
  const placed=Object.entries(game.dragPlaced).filter(([k,v])=>v!==null);
  const m=Math.floor(game.elapsed/60),sec=game.elapsed%60;
  document.getElementById('mainContent').innerHTML=`
    <div class="game-wrap">
      <div class="game-header">
        <div><div class="game-score">${game.score}/${game.total}</div><div class="game-streak">🔥 ${game.streak} streak</div></div>

      </div>
      <div style="margin-bottom:12px;font-size:12px;color:var(--text-secondary);text-align:center">Drag the question onto the matching topic</div>
      <div style="background:var(--bg-primary);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px">
        <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:6px">✋ DRAG ME →</div>
        <div draggable="true"
             style="padding:12px;border-radius:var(--radius-md);border:2px solid #7F77DD;background:rgba(127,119,221,.08);font-size:14px;cursor:grab;line-height:1.5;user-select:none"
             id="dragQ" data-tid="${current.tid}" data-qidx="${current.qi}"
             ondragstart="event.dataTransfer.setData('text',this.dataset.tid+':'+this.dataset.qidx);this.style.opacity='.4'"
             ondragend="this.style.opacity='1'">
          "${current.q}"
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
        ${game.dragSlots.map(tid=>{
          const tn=TOPICS.find(t=>t.id===tid).name;
          const pq=Object.entries(game.dragPlaced).filter(([k,v])=>v===tid);
          return `<div style="flex:1;min-width:140px;max-width:200px;border:2px dashed var(--border-light);border-radius:var(--radius-lg);padding:12px;text-align:center;min-height:100px;background:var(--bg-primary);transition:all .12s"
                      id="slot-${tid}" data-tid="${tid}"
                      ondragover="event.preventDefault();this.style.borderColor='#7F77DD';this.style.background='rgba(127,119,221,.08)'"
                      ondragleave="this.style.borderColor='';this.style.background='var(--bg-primary)'"
                      ondrop="event.preventDefault();this.style.borderColor='';this.style.background='var(--bg-primary)';dropDrag(event,${tid})">
            <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">📁 ${tn}</div>
            ${pq.length?pq.map(([k])=>{
              const[t,qi]=k.split(':').map(Number);
              const txt=TOPICS.find(x=>x.id===t).qs[qi];
              return `<div style="font-size:10px;padding:3px 6px;background:#EEEDFE;border-radius:6px;margin:2px;color:#3C3489">${txt.length>25?txt.slice(0,25)+'…':txt}</div>`;
            }).join(''):'<div style="font-size:11px;color:var(--text-tertiary);padding:8px">Drop here</div>'}
          </div>`;
        }).join('')}
      </div>
      <div style="text-align:center;margin-top:16px">
        <button class="btn" onclick="game={active:false};render()"><i class="ti ti-x"></i> Quit</button>
      </div>
    </div>`;
}

function dropDrag(e,slotTid){
  const raw=e.dataTransfer.getData('text');
  if(!raw||game.answered)return;
  const parts=raw.split(':');
  const qtid=parseInt(parts[0]),qidx=parseInt(parts[1]);
  if(isNaN(qtid)||isNaN(qidx))return;
  game.answered=true;
  const key=qtid+':'+qidx;
  game.dragPlaced[key]=slotTid;
  if(qtid===slotTid){game.score++;game.streak++;if(game.streak>game.bestStreak)game.bestStreak=game.streak;}
  else game.streak=0;
  setTimeout(()=>{game.idx++;game.answered=false;if(game.idx>=game.total)clearInterval(game.timerInterval);render();},500);
}

function startFlashcardGame(){
  const pool=[];
  SELECTED_IDS.forEach(tid=>{
    const t=TOPICS.find(x=>x.id===tid);
    if(t)t.qs.forEach((q,i)=>pool.push({q,tid,tn:t.name,qi:i}));
  });
  const shuffled=pool.sort(()=>Math.random()-.5);
  const deck=shuffled.map(c=>({...c,rating:null}));
  game={mode:'flash',active:true,deck,idx:0,score:0,total:deck.length,streak:0,flipped:false,startTime:Date.now(),timerInterval:null,elapsed:0};
  game.timerInterval=setInterval(()=>{game.elapsed=Math.floor((Date.now()-game.startTime)/1000);},1000);
  render();
}

function renderFlashcardGame(){
  if(!game.deck||game.idx>=game.deck.length){
    renderGameEnd();
    return;
  }
  const card=game.deck[game.idx];
  const done=game.deck.filter(c=>c.rating!==null).length;
  const pct=Math.round(done/game.total*100);
  document.getElementById('mainContent').innerHTML=`
    <div class="flash-wrap">
      <div class="flash-progress"><div class="flash-progress-bar" style="width:${pct}%"></div></div>
      <div class="flash-stats">
        <span>📇 ${done}/${game.total}</span>
        <span>🔥 ${game.streak}</span>
        <span>✅ ${game.score} easy</span>
      </div>
      <div class="flash-card" id="flashCard" onclick="flipCard(event)">
        <div class="flash-card-inner" style="position:relative;min-height:200px">
          <div class="flash-front" style="position:relative">
            <div class="flash-label">${card.tn} — Question</div>
            <div class="flash-q">"${card.q}"</div>
            <div class="flash-tap">👆 Tap to reveal answer</div>
          </div>
          <div class="flash-back" style="position:relative">
            <div class="flash-label">Sample Answer</div>
            <div class="flash-a">${getAnswer(card.tid,card.qi)}</div>
          </div>
        </div>
      </div>
      <div class="flash-rate" id="flashRate" style="display:none">
        <button class="hard" onclick="rateCard('hard')">😰 Hard</button>
        <button class="good" onclick="rateCard('good')">🤔 Got it</button>
        <button class="easy" onclick="rateCard('easy')">😎 Easy</button>
      </div>
    </div>`;
  game.flipped=false;
}

function flipCard(e){
  if(e.target.closest('.flash-rate')||e.target.closest('button'))return;
  const card=document.getElementById('flashCard');
  if(!card)return;
  card.classList.toggle('flipped');
  game.flipped=!game.flipped;
  document.getElementById('flashRate').style.display=game.flipped?'flex':'none';
}

function rateCard(rating){
  if(!game.deck||game.idx>=game.deck.length)return;
  game.deck[game.idx].rating=rating;
  if(rating==='easy'){game.score++;game.streak++;if(game.streak>game.bestStreak)game.bestStreak=game.streak;}
  else if(rating==='good')game.streak++;
  else game.streak=0;
  game.idx++;
  game.flipped=false;
  render();
}

function analyzeAnswers(){
  const keys=Object.keys(state.answers);
  if(keys.length===0){alert('No answers saved yet! Fill in some answers first in the Resume tab.');return;}

    const[tid,qi]=k.split('_').map(Number);
    const t=TOPICS.find(x=>x.id===tid);
    return `Topic ${tid} (${t?.name||'?'}) Q: "${t?.qs[qi]||'?'}"\nAnswer: "${state.answers[k]}"`;
  }).join('\n\n---\n\n');
  const prompt=`You are an IELTS examiner. Analyze these IELTS Speaking Part 1 answers from a candidate. For each, give a brief score out of 9, one improvement tip, and highlight the best vocabulary. Then give an overall estimated band score (4-9), strengths, and weaknesses.

${texts}

Format your response as:
## Overall Assessment
Estimated Band: [X.X/9]

### Strengths
- ...

### Areas to Improve
- ...

### Detailed Feedback
For each answer: Band X/9, tip, best vocab.`;

    attempt++;
    fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer sk-a74e24f3c9d347a2baddd0d5de1ecaf0'},
      body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:2000,temperature:0.5})
    }).then(r=>r.json()).then(d=>{
      const ans=d.choices?.[0]?.message?.content||'';
      if(ans){
        const bandMatch=ans.match(/Band[:\\s]*(\\d+(\\.\\d)?)/i);
        const band=bandMatch?bandMatch[1]:'?';
        const pct=Math.min(parseFloat(band)/9*100,100)||50;
        const html=`<div class="analysis-wrap">
          <div class="analysis-box">
            <h3>📊 Overall Assessment</h3>
            <div style="text-align:center;margin:16px 0"><span class="band">${band}/9</span></div>

          </div>

        </div>`;
        content.innerHTML=html;
      }else throw new Error('Empty');
    }).catch(e=>{
      if(attempt<=maxRetries){setTimeout(tryFetch,1500);return;}
      content.innerHTML=`<div class="analysis-wrap"><div class="analysis-box"><h3>❌ Analysis Failed</h3><p style="color:var(--text-secondary)">Could not reach DeepSeek API. Check your internet and try again.</p><br><button class="btn primary" onclick="render()">Back</button></div></div>`;

Question: "${question}"`;

    attempt++;

/**
 * Simplify a dictionary definition for IELTS learners.
 * Extracts the core meaning, reduces clause complexity.
 */
function simplifyDefinition(def) {
  // Remove parenthetical asides
  let simple = def.replace(/\([^)]*\)/g, '').trim();
  // If it's a long definition starting with a prepositional phrase, try to focus
  simple = simple.replace(/^(In|Of|By|For|With|Without|Through|As a)\s+\w+[\s\S]{0,50}?(is|are|refers to|means|describes|relates to|involves|concerns)/i, m => m);
  // Take first sentence
  const firstSentence = simple.split(/[.;:](?:\s|$)/)[0].trim();
  if (firstSentence.length > 20 && firstSentence.length < 160) {
    simple = firstSentence;
  }
  // If still too long, truncate
  if (simple.length > 160) {
    simple = simple.slice(0, 157) + '...';
  }
  return simple;
}

function showWordPopup(word, x, y) {
  const popup = document.getElementById('wordPopup');
  const overlay = document.getElementById('wordPopupOverlay');
  const body = document.getElementById('wpBody');

  // Sanitize word
  word = word.replace(/[^a-zA-Z'-]/g, '').trim().toLowerCase();
  if (!word || word.length < 2) return;

  document.getElementById('wpWord').textContent = word;
  document.getElementById('wpPhonetic').textContent = '';
  body.innerHTML = '<div class="word-popup-loading">🔍 Looking up definition...</div>';

  popup.style.display = 'block';
  overlay.style.display = 'block';

  // Position popup - clamp to viewport
  const pw = 320;
  const vw = window.innerWidth;
  let px = Math.max(8, Math.min(x - pw / 2, vw - pw - 8));
  let py = Math.max(8, y - 20);

  // If below the fold, position above
  if (py + 300 > window.innerHeight) {
    py = Math.max(8, y - 300);
    // If still off screen, just center
    if (py < 8) {
      py = Math.max(8, window.innerHeight / 2 - 150);
    }
  }

  popup.style.left = px + 'px';
  popup.style.top = py + 'px';

  // Fetch definition from Free Dictionary API
  fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`)
    .then(r => {
      if (!r.ok) throw new Error('Not found');
      return r.json();
    })
    .then(data => {
      if (!data || !data[0]) throw new Error('No data');

      const entry = data[0];
      const phonetic = entry.phonetic || (entry.phonetics && entry.phonetics.find(p => p.text)?.text) || '';
      document.getElementById('wpPhonetic').textContent = phonetic;

      let html = '';

      // Show up to 3 meanings
      const meanings = entry.meanings || [];
      const shown = meanings.slice(0, 3);

      shown.forEach((m, mi) => {
        const partOfSpeech = m.partOfSpeech || '';
        const defs = m.definitions || [];

        if (partOfSpeech) {
          html += `<div class="word-popup-part">${partOfSpeech}</div>`;
        }

        // Show first definition
        if (defs[0]) {
          const defText = defs[0].definition || '';
          html += `<div class="word-popup-def">${defText}</div>`;

          // Example
          if (defs[0].example) {
            html += `<div class="word-popup-example">“${defs[0].example}”</div>`;
          }

          // Simple definition for IELTS learners
          const simple = simplifyDefinition(defText);
          if (simple && simple !== defText) {
            html += `<div class="word-popup-simple">
              <div class="word-popup-simple-label">✨ Simple version</div>
              ${simple}
            </div>`;
          }
        }

        // Show second definition if available (for context)
        if (defs[1] && mi < 1) {
          const def2 = defs[1].definition || '';
          html += `<div class="word-popup-def" style="font-size:12px;color:var(--text-secondary);margin-top:2px">${def2}</div>`;
        }
      });

      html += `<div class="word-popup-actions">
        <button class="btn primary" onclick="searchWordImage('${word.replace(/'/g,"\\'")}')"><i class="ti ti-photo"></i> Search Images</button>
        <button class="btn" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(word)}+definition','_blank')"><i class="ti ti-external-link"></i> Full definition</button>
      </div>`;

      body.innerHTML = html;
    })
    .catch(err => {
      // Fallback: show a simple definition hint + search options
      body.innerHTML = `
        <div class="word-popup-error">
          <p style="margin-bottom:8px">Could not find "${word}" in the dictionary.</p>
          <div class="fallback-def">Try searching online for this word.</div>
          <div class="word-popup-actions" style="margin-top:10px;justify-content:center">
            <button class="btn primary" onclick="searchWordImage('${word.replace(/'/g,"\\'")}')"><i class="ti ti-photo"></i> Search Images</button>
            <button class="btn" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(word)}+definition','_blank')"><i class="ti ti-external-link"></i> Google it</button>
          </div>
        </div>`;
    });
}

// Word lookup: double-click on desktop, long-press on mobile/tablet
let longPressTimer = null;
let longPressTriggered = false;

document.addEventListener('dblclick', function(e) {
  if (e.target.closest('.modal') || e.target.closest('#wordPopup') || e.target.closest('.word-popup-overlay')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.target.isContentEditable) return;
  const selection = window.getSelection();
  const selectedText = selection.toString().trim();
  if (selectedText && selectedText.length >= 2 && selectedText.length <= 45) {
    showWordPopup(selectedText, e.clientX, e.clientY);
  }
});

document.addEventListener('touchstart', function(e) {
  if (e.target.closest('.modal') || e.target.closest('#wordPopup') || e.target.closest('.word-popup-overlay')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.target.isContentEditable) return;
  longPressTriggered = false;
  const touch = e.touches[0];
  longPressTimer = setTimeout(() => {
    longPressTriggered = true;
    // Get the word at the touch point
    const range = document.caretRangeFromPoint(touch.clientX, touch.clientY);
    if (!range) return;
    const textNode = range.startContainer;
    if (!textNode || textNode.nodeType !== 3) return; // must be a text node
    const text = textNode.textContent || '';
    const offset = range.startOffset;
    // Find the word boundaries around the offset
    let start = offset, end = offset;
    while (start > 0 && /[a-zA-Z']/.test(text[start - 1])) start--;
    while (end < text.length && /[a-zA-Z']/.test(text[end])) end++;
    const word = text.slice(start, end).replace(/[^a-zA-Z'-]/g, '').trim().toLowerCase();
    if (word && word.length >= 2) {
      // Cancel any text selection
      window.getSelection().removeAllRanges();
      showWordPopup(word, touch.clientX, touch.clientY);
    }
  }, 600);
}, { passive: true });

document.addEventListener('touchmove', function() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}, { passive: true });

document.addEventListener('touchend', function() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}, { passive: true });

loadSaved();
render();
</script>
</body>
</html>
